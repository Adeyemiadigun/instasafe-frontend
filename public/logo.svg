<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="50" y1="20" x2="150" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="70" y1="85" x2="135" y2="135" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path
    d="M100 18 L170 48 C170 48 175 105 160 135 C145 165 120 178 100 185 C80 178 55 165 40 135 C25 105 30 48 30 48 Z"
    fill="url(#shieldGrad)"
    stroke="#0d6b63"
    stroke-width="2"
  />

  <!-- Inner shield highlight -->
  <path
    d="M100 30 L160 56 C160 56 164 105 152 130 C140 155 118 168 100 174 C82 168 60 155 48 130 C36 105 40 56 40 56 Z"
    fill="none"
    stroke="#14b8a6"
    stroke-width="1"
    opacity="0.3"
  />

  <!-- Checkmark -->
  <path
    d="M72 100 L92 120 L132 78"
    stroke="url(#checkGrad)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Subtle "S" curve inside shield (for "Safe") -->
  <path
    d="M85 140 C85 135 95 130 105 130 C115 130 125 135 125 140 C125 145 115 150 105 150 C95 150 85 145 85 140"
    fill="none"
    stroke="#5eead4"
    stroke-width="1.5"
    opacity="0.4"
  />
</svg>
