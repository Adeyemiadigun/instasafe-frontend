  <!-- Wordmark: "InstaSafe" -->
  <text x="82" y="58" font-family="'Outfit', 'Plus Jakarta Sans', system-ui, sans-serif" font-size="44" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#f5f5f4">Insta</tspan><tspan fill="#2dd4bf">Safe</tspan>
  </text>

  <!-- Tagline -->
  <text x="83" y="80" font-family="'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif" font-size="14" fill="#a8a29e" letter-spacing="0.5">Secure Escrow Payments</text>
