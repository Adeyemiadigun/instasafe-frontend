<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 100" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="8" y1="6" x2="72" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="24" y1="42" x2="56" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <path
    d="M40 6 L68 19 C68 19 70 42 64 54 C58 66 48 71 40 74 C32 71 22 66 16 54 C10 42 12 19 12 19 Z"
